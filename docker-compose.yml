version: "3.9"

services:

  # ── API ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: graphrag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - graphrag_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: graphrag_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - graphrag_net

  # ── Ollama ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: graphrag_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - graphrag_net

  # ── Redis ────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: graphrag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - graphrag_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MLflow ───────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: graphrag_mlflow
    restart: unless-stopped
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - graphrag_net

  # ── Ingestion (run once) ─────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: graphrag_ingestion
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - graphrag_net
    profiles:
      - ingest

# ── Volumes ──────────────────────────────────────
volumes:
  ollama_data:
  redis_data:
  mlflow_data:

# ── Networks ─────────────────────────────────────
networks:
  graphrag_net:
    driver: bridge
